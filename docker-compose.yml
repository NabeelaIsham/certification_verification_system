name: certverify

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - ./Backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/certverify
      API_URL: https://verifyawards.com
      FRONTEND_URL: https://verifyawards.com
      CORS_ORIGIN: http://localhost:3000,https://verifyawards.com
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', 'const http=require("http"); http.get("http://127.0.0.1:5000/health", res => process.exit(res.statusCode === 200 ? 0 : 1)).on("error", () => process.exit(1));']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - backend-uploads:/usr/src/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - '3000:80'
    restart: unless-stopped

  mongo:
    image: mongo:4.4
    command: ['mongod', '--bind_ip_all']
    healthcheck:
      test: ['CMD', 'mongo', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
    name: certification_verification_system_mongo-data
  backend-uploads:
    name: certification_verification_system_backend-uploads
