version: '3.9'
services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: certverify-backend
    env_file:
      - ./Backend/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/certverify
      JWT_SECRET: change-this-secret
      API_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000,https://verifyrewards.com
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - backend-uploads:/usr/src/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: certverify-frontend
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: certverify-mongo
    command: ['mongod', '--bind_ip_all']
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  backend-uploads:
